name: lint_test_wf
on: workflow_dispatch
jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run Test
        run: npm run test
      - name: Run lint
        run: npm run lint



